name: Build and Deploy

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ensai-2026
  REGION: europe-west
  SERVICE_NAME: gender-prediction-api
  IMAGE: europe-docker.pkg.dev/ensai-2026/christophe/api-id2363

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_JSON_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:latest \
            --region ${{ env.REGION }} \
            --allow-unauthenticated